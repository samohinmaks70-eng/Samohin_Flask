{% extends "base.html" %}
{% block title %}Вход — FinTrc{% endblock %}

{% block auth_content %}
<div class="row justify-content-center">
  <div class="col-sm-8 col-md-5 col-lg-4">

    <div class="text-center mb-4">
      <h1 class="text-success fw-bold">₽ FinTrc</h1>
      <p class="text-muted">Трекер личных финансов</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="card-title mb-4">Вход в аккаунт</h5>

        <form method="POST" action="{{ url_for('login') }}">

          <div class="mb-3">
            <label class="form-label">Имя пользователя</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Введите имя" required autofocus>
          </div>

          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-success w-100">Войти</button>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      Нет аккаунта?
      <a href="{{ url_for('register') }}" class="text-success">Зарегистрироваться</a>
    </p>

  </div>
</div>
{% endblock %}
