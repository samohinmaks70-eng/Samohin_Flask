{% extends "base.html" %}
{% block title %}Регистрация — FinTrc{% endblock %}

{% block auth_content %}
<div class="row justify-content-center">
  <div class="col-sm-8 col-md-6 col-lg-4">

    <div class="text-center mb-4">
      <h1 class="text-success fw-bold">₽ FinTrc</h1>
      <p class="text-muted">Создайте аккаунт бесплатно</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="card-title mb-4">Регистрация</h5>

        <form method="POST" action="{{ url_for('register') }}">

          <div class="mb-3">
            <label class="form-label">Имя пользователя</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Придумайте имя" required autofocus>
          </div>

          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Минимум 6 символов" required>
          </div>

          <div class="mb-4">
            <label class="form-label">Подтвердите пароль</label>
            <input type="password" name="confirm" class="form-control"
                   placeholder="Повторите пароль" required>
          </div>

          <button type="submit" class="btn btn-success w-100">Создать аккаунт</button>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      Уже есть аккаунт?
      <a href="{{ url_for('login') }}" class="text-success">Войти</a>
    </p>

  </div>
</div>
{% endblock %}
