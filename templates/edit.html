{% extends "base.html" %}
{% block title %}Редактировать — FinTrc{% endblock %}

{% block content %}
<h4 class="mb-4">Редактировать / Удалить транзакцию</h4>

<!-- Форма поиска по ID -->
<div class="card shadow-sm mb-4" style="max-width: 520px;">
  <div class="card-body p-4">
    <label class="form-label">Введите ID транзакции</label>
    <form method="GET" action="{{ url_for('edit') }}" class="d-flex gap-2">
      <input type="number" name="id" class="form-control"
             placeholder="Например: 5"
             value="{{ transaction.id if transaction else '' }}" required>
      <button type="submit" class="btn btn-outline-success">Загрузить</button>
    </form>
    <div class="form-text">ID транзакции можно посмотреть в <a href="{{ url_for('history') }}">Истории</a>.</div>
  </div>
</div>

<!-- Форма редактирования (показывается только если транзакция найдена) -->
{% if transaction %}
<div class="card shadow-sm" style="max-width: 520px;">
  <div class="card-header">
    Транзакция #{{ transaction.id }}
  </div>
  <div class="card-body p-4">
    <form method="POST" action="{{ url_for('edit') }}">
      <!-- Скрытые поля -->
      <input type="hidden" name="id"     value="{{ transaction.id }}">
      <input type="hidden" name="action" value="update">

      <!-- Дата -->
      <div class="mb-3">
        <label class="form-label">Дата</label>
        <input type="date" name="date" class="form-control"
               value="{{ transaction.date }}" required>
      </div>

      <!-- Сумма -->
      <div class="mb-3">
        <label class="form-label">Сумма (₽)</label>
        <input type="number" name="amount" class="form-control"
               value="{{ transaction.amount }}" min="0.01" step="0.01" required>
      </div>

      <!-- Тип -->
      <div class="mb-3">
        <label class="form-label">Тип</label>
        <select name="type" class="form-select">
          <option value="income"  {% if transaction.type == 'income'  %}selected{% endif %}>Доход</option>
          <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Расход</option>
        </select>
      </div>

      <!-- Категория -->
      <div class="mb-3">
        <label class="form-label">Категория</label>
        <select name="category" class="form-select">
          {% for cat in income_cats %}
            <option value="{{ cat }}" {% if transaction.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
          {% for cat in expense_cats %}
            <option value="{{ cat }}" {% if transaction.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Описание -->
      <div class="mb-4">
        <label class="form-label">Описание</label>
        <input type="text" name="description" class="form-control"
               value="{{ transaction.description or '' }}">
      </div>

      <!-- Кнопки -->
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success flex-grow-1">
          <i class="bi bi-check-lg me-1"></i>Сохранить
        </button>
      </div>
    </form>

    <!-- Удаление — отдельная форма -->
    <form method="POST" action="{{ url_for('edit') }}" class="mt-2"
          onsubmit="return confirm('Удалить транзакцию #{{ transaction.id }}?')">
      <input type="hidden" name="id"     value="{{ transaction.id }}">
      <input type="hidden" name="action" value="delete">
      <button type="submit" class="btn btn-outline-danger w-100">
        <i class="bi bi-trash me-1"></i>Удалить транзакцию
      </button>
    </form>

  </div>
</div>
{% endif %}

{% endblock %}
